swagger: '2.0'
info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: '1.0.0'
  termsOfService: 'http://swagger.io/terms/'
host: localhost:3001
basePath: /api/v1
schemes:
  - http
paths:
  /user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: API for Login
      parameters:
        - in: body
          name: body
          description: Login Payload
          required: true
          schema:
            $ref: '#/definitions/Login'
      produces:
        - application/json
      responses:
        '200':
          description: Login Successfully
          schema:
            $ref: '#/definitions/LoginResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: API for Signup
      parameters:
        - in: body
          name: body
          description: Signup Payload
          required: true
          schema:
            $ref: '#/definitions/User'
      produces:
        - application/json
      responses:
        '200':
          description: Signup Successfully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/profile:
    get:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for fetching a user profile
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for updating a user profile
      parameters:
        - in: body
          name: body
          description: Update user profile attributes
          required: true
          schema:
            $ref: '#/definitions/UserProfile'
      produces:
        - application/json
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error

  /user/accounts/{accountId}/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Get account transactions
      description: >
        Retourne la liste de toutes les transactions du mois en cours pour un
        compte bancaire donné, triées par date décroissante.
      parameters:
        - in: path
          name: accountId
          description: Identifiant unique du compte bancaire
          required: true
          type: string
        - in: query
          name: month
          description: >
            Mois à consulter au format YYYY-MM (optionnel, par défaut le mois
            en cours)
          required: false
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Transactions récupérées avec succès
          schema:
            $ref: '#/definitions/TransactionListResponse'
        '400':
          description: Paramètres invalides
        '401':
          description: Non autorisé – token manquant ou invalide
        '404':
          description: Compte introuvable
        '500':
          description: Erreur interne du serveur

  /user/accounts/{accountId}/transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Get transaction details
      description: >
        Retourne le détail complet d'une transaction spécifique (type,
        catégorie, note).
      parameters:
        - in: path
          name: accountId
          description: Identifiant unique du compte bancaire
          required: true
          type: string
        - in: path
          name: transactionId
          description: Identifiant unique de la transaction
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Détail de la transaction récupéré avec succès
          schema:
            $ref: '#/definitions/TransactionDetailResponse'
        '401':
          description: Non autorisé – token manquant ou invalide
        '404':
          description: Transaction ou compte introuvable
        '500':
          description: Erreur interne du serveur
    patch:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Update transaction category or note
      description: >
        Met à jour les informations éditables d'une transaction : la catégorie
        (via un select dropdown) et/ou la note (via un champ texte libre).
        Les autres champs (montant, date, description, type) sont en lecture seule.
      parameters:
        - in: path
          name: accountId
          description: Identifiant unique du compte bancaire
          required: true
          type: string
        - in: path
          name: transactionId
          description: Identifiant unique de la transaction
          required: true
          type: string
        - in: body
          name: body
          description: Champs éditables de la transaction
          required: true
          schema:
            $ref: '#/definitions/TransactionUpdate'
      produces:
        - application/json
      responses:
        '200':
          description: Transaction mise à jour avec succès
          schema:
            $ref: '#/definitions/TransactionDetailResponse'
        '400':
          description: Champs invalides
        '401':
          description: Non autorisé – token manquant ou invalide
        '404':
          description: Transaction ou compte introuvable
        '500':
          description: Erreur interne du serveur

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
definitions:
  User:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
      firstName:
        type: string
        description: user first name
      lastName:
        type: string
        description: user last name
      userName:
        type: string
        description: user public name
  Login:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
  LoginResponse:
    type: object
    properties:
      token:
        type: string
  UserProfile:
    type: object
    properties:
      userName:
        type: string

  Transaction:
    type: object
    properties:
      id:
        type: string
        description: Identifiant unique de la transaction
      date:
        type: string
        format: date
        description: Date de la transaction (ex. 2020-02-27)
      description:
        type: string
        description: Libellé de la transaction (ex. Golden Sun Bakery)
      amount:
        type: number
        format: double
        description: Montant de la transaction en dollars
      balance:
        type: number
        format: double
        description: Solde du compte après la transaction
      type:
        type: string
        description: Type de transaction (ex. Electronic)
      category:
        type: string
        description: Catégorie de la transaction (ex. Food, Housing, Transport)
      note:
        type: string
        description: Note libre ajoutée par l'utilisateur (peut être vide)

  TransactionListResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          $ref: '#/definitions/Transaction'

  TransactionDetailResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        $ref: '#/definitions/Transaction'

  TransactionUpdate:
    type: object
    description: >
      Seuls les champs éditables sont acceptés. Au moins un des deux champs
      doit être fourni.
    properties:
      category:
        type: string
        description: >
          Nouvelle catégorie choisie via le select dropdown
          (ex. Food, Housing, Transport, Leisure, Other)
      note:
        type: string
        description: >
          Note libre saisie via le champ texte
          (chaîne vide autorisée pour effacer la note)
